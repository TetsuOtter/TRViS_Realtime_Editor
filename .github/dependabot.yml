version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      tauri:
        patterns: ["@tauri-apps/*"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      eslint:
        patterns: ["eslint*", "@eslint/*", "typescript-eslint", "globals"]
      testing:
        patterns: ["vitest", "@testing-library/*", "happy-dom"]

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly

  - package-ecosystem: nuget
    directory: /test-harness/TRViSTestHarness
    schedule:
      interval: weekly
