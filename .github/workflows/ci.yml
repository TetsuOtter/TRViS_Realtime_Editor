name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Lint / format check (fast)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm format:check

      - name: rustfmt check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --exclude trvis-realtime-editor -- -D warnings

  # ---------------------------------------------------------------------------
  # Frontend: typecheck / unit tests / production build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (TS) build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build (tsc + vite)
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: dist
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Rust workspace tests (skip the Tauri crate in plain CI; gtk/webkit
  # system libs aren't installed here. Tauri build is in tauri-build.yml.)
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (workspace, no Tauri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust

      - name: Build core crates
        run: cargo build -p trvis-ws-server -p trvis-ws-server-bin

      - name: Test core crates
        run: cargo test -p trvis-ws-server -p trvis-ws-server-bin

  # ---------------------------------------------------------------------------
  # Playwright UI E2E: stub Tauri runtime in a real browser, plus a
  # wire-level test that drives the standalone trvis-ws-server bin.
  # ---------------------------------------------------------------------------
  ui-e2e:
    name: UI E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, rust]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build trvis-ws-server bin (for wire test)
        run: cargo build -p trvis-ws-server-bin

      - name: Run Playwright tests
        run: pnpm test:e2e:ui

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  # ---------------------------------------------------------------------------
  # E2E: docker compose で app + harness 起動 → vitest e2e
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (docker compose + harness)
    runs-on: ubuntu-latest
    needs: [frontend, rust]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & start compose services
        working-directory: docker
        run: docker compose up -d --build

      - name: Wait for harness to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health > /dev/null 2>&1; then
              echo "harness ready"
              exit 0
            fi
            sleep 2
          done
          echo "harness did not become healthy" >&2
          docker compose -f docker/docker-compose.yml logs
          exit 1

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs --no-color

      - name: Tear down
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v --remove-orphans
