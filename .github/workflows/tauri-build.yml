name: Tauri build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      tag_name:
        description: "リリースタグ名 (例: v1.2.3)"
        required: false
        type: string
        default: ""

concurrency:
  group: tauri-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.platform.os }}
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          # macOS: 1 ジョブで universal → arm64 → x64 を順にビルド
          # universal ビルドで生成された Rust キャッシュを arm64/x64 が再利用し総実行時間を短縮する
          - { os: macos, runner: macos-latest }

          # Linux: x86_64 / aarch64 の 2 ターゲット
          - { os: linux-x64, runner: ubuntu-24.04, target: x86_64-unknown-linux-gnu }
          - { os: linux-arm64, runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }

          # Windows: x86_64 / aarch64 の 2 ターゲット
          - { os: windows-x64, runner: windows-latest, target: x86_64-pc-windows-msvc }
          - { os: windows-arm64, runner: windows-11-arm, target: aarch64-pc-windows-msvc }

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS は universal / arm64 / x64 の 3 ターゲットをビルドするため両アーキテクチャを要する
          targets: ${{ matrix.platform.os == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          shared-key: tauri-${{ matrix.platform.os }}

      - name: Install Linux dependencies (apt picks the right arch automatically)
        if: startsWith(matrix.platform.os, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - run: pnpm install --frozen-lockfile

      # タグ push 経由 (refs/tags/v*) と workflow_call 経由 (inputs.tag_name) の両方に対応し
      # 後続ステップで参照できる共通の出力値を作る。
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          TAG_FROM_REF: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          TAG_FROM_INPUT: ${{ inputs.tag_name || '' }}
        run: |
          TAG="${TAG_FROM_REF:-$TAG_FROM_INPUT}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          [ -n "$TAG" ] && echo "is_release=true" >> "$GITHUB_OUTPUT" || echo "is_release=false" >> "$GITHUB_OUTPUT"

      # 非タグビルド (PR / main push / 手動実行) では tauri.conf.json の version を
      # `0.1.<run_number>` 形式で上書きし、生成バンドルの内部バージョンが固定値
      # 0.1.0 のままにならないようにする。
      - name: Stamp dev version (non-tag builds)
        if: steps.release.outputs.is_release == 'false'
        shell: bash
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            const parts = c.version.split('.');
            const stamped = parts[0] + '.' + parts[1] + '.' + process.env.RUN_NUMBER;
            c.version = stamped;
            fs.writeFileSync(p, JSON.stringify(c, null, '\t') + '\n');
            console.log('stamped version:', stamped);
          "

      # タグビルドではタグ名 (例: v1.2.3) からセマンティックバージョンを取り出し
      # tauri.conf.json と src-tauri/Cargo.toml の両方に書き込む。
      # これにより release.yml でコミットを作らなくてもアプリ内バージョンが正しく表示される。
      - name: Stamp release version from tag
        if: steps.release.outputs.is_release == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          node -e "
            const fs = require('fs');
            const semver = process.env.RELEASE_TAG.replace(/^v/, '');

            const confPath = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(confPath, 'utf8'));
            conf.version = semver;
            fs.writeFileSync(confPath, JSON.stringify(conf, null, '\t') + '\n');

            const cargoPath = 'src-tauri/Cargo.toml';
            const cargo = fs.readFileSync(cargoPath, 'utf8');
            fs.writeFileSync(cargoPath, cargo.replace(/^version\s*=\s*\"[^\"]+\"/m, 'version = \"' + semver + '\"'));

            console.log('stamped release version:', semver);
          "

      # macOS 向けビルドの最低 OS バージョンを設定する。
      # x86_64 スライス: macOS 10.13 (High Sierra) 以降を対象とする。
      # arm64 スライス: Apple Silicon Mac は macOS 11.0 以降でのみ動作するため
      #                 10.13 に設定しても実害はなく、ユニバーサルバイナリの結合に影響しない。
      - name: Set macOS minimum deployment target
        if: startsWith(matrix.platform.os, 'macos')
        run: echo "MACOSX_DEPLOYMENT_TARGET=10.13" >> "$GITHUB_ENV"

      # macOS: universal → arm64 → x64 の順にビルド。
      # universal ビルドで Rust コンパイル済み成果物が生成されるため、
      # arm64 / x64 の単体ビルドは bundle 生成のみで高速に完了する。
      - name: Build Tauri app (macOS universal)
        if: matrix.platform.os == 'macos'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_COMMIT: ${{ github.sha }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: --target universal-apple-darwin
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: ${{ steps.release.outputs.tag }}
          releaseDraft: true
          prerelease: false

      - name: Build Tauri app (macOS arm64)
        if: matrix.platform.os == 'macos'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_COMMIT: ${{ github.sha }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: --target aarch64-apple-darwin
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: ${{ steps.release.outputs.tag }}
          releaseDraft: true
          prerelease: false

      - name: Build Tauri app (macOS x64)
        if: matrix.platform.os == 'macos'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_COMMIT: ${{ github.sha }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: --target x86_64-apple-darwin
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: ${{ steps.release.outputs.tag }}
          releaseDraft: true
          prerelease: false

      - name: Build Tauri app
        if: matrix.platform.os != 'macos'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # build.rs がこの値を `cargo:rustc-env=GIT_COMMIT=...` で実行バイナリに埋め込む。
          GIT_COMMIT: ${{ github.sha }}
        with:
          args: --target ${{ matrix.platform.target }}
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: ${{ steps.release.outputs.tag }}
          releaseDraft: true
          prerelease: false

      - uses: actions/upload-artifact@v7
        if: always() && matrix.platform.os == 'macos'
        with:
          name: tauri-macos
          path: |
            target/universal-apple-darwin/release/bundle/**/*
            target/aarch64-apple-darwin/release/bundle/**/*
            target/x86_64-apple-darwin/release/bundle/**/*
          if-no-files-found: ignore
          retention-days: ${{ github.event_name == 'pull_request' && 1 || (github.ref == 'refs/heads/main' && 7) || 14 }}

      - uses: actions/upload-artifact@v7
        if: always() && matrix.platform.os != 'macos'
        with:
          name: tauri-${{ matrix.platform.os }}
          path: |
            target/${{ matrix.platform.target }}/release/bundle/**/*
          if-no-files-found: ignore
          retention-days: ${{ github.event_name == 'pull_request' && 1 || (github.ref == 'refs/heads/main' && 7) || 14 }}
