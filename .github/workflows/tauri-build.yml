name: Tauri build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: tauri-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.platform.os }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # macOS は Apple Silicon (arm64) のみ
          - { os: macos-arm64, runner: macos-latest, target: aarch64-apple-darwin }

          # Linux: x86_64 / aarch64 の 2 ターゲット
          - { os: linux-x64, runner: ubuntu-24.04, target: x86_64-unknown-linux-gnu }
          - { os: linux-arm64, runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }

          # Windows: x86_64 / aarch64 の 2 ターゲット
          - { os: windows-x64, runner: windows-latest, target: x86_64-pc-windows-msvc }
          - { os: windows-arm64, runner: windows-11-arm, target: aarch64-pc-windows-msvc }

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: tauri-${{ matrix.platform.os }}

      - name: Install Linux dependencies (apt picks the right arch automatically)
        if: startsWith(matrix.platform.os, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.platform.target }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseDraft: true
          prerelease: false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tauri-${{ matrix.platform.os }}
          path: |
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*
          if-no-files-found: ignore
          retention-days: 14
