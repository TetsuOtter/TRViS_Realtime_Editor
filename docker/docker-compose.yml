services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    ports:
      - "23519:23519"
      - "23520:23520"
    stdin_open: true
    healthcheck:
      test: ["CMD-SHELL", "echo ok"]
      interval: 2s
      timeout: 5s
      retries: 10

  harness:
    build:
      context: ..
      dockerfile: docker/Dockerfile.harness
    ports:
      - "8080:8080"
    environment:
      - TRVIS_WS_URL=ws://app:23519/ws
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
